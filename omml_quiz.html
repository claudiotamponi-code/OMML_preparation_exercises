<style>
  body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
  .header{background:#1e293b;padding:16px 24px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .header h1{font-size:1.3rem;font-weight:700;color:#38bdf8;}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  select,button.ctrl-btn{background:#334155;border:1px solid #475569;color:#e2e8f0;padding:6px 12px;border-radius:8px;font-size:0.85rem;cursor:pointer;}
  select:hover,button.ctrl-btn:hover{background:#475569;}
  button.ctrl-btn.active{background:#0284c7;border-color:#0284c7;}
  .progress-bar-wrap{background:#1e293b;height:4px;}
  .progress-bar{height:4px;background:linear-gradient(90deg,#38bdf8,#818cf8);transition:width 0.3s;}
  .score-bar{background:#1e293b;padding:10px 24px;display:flex;gap:24px;font-size:0.85rem;border-bottom:1px solid #334155;flex-wrap:wrap;align-items:center;}
  .score-item{display:flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:50%;}
  .wrong-pill{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
  #bookmarkPill{background:#78350f;border-color:#f59e0b;color:#fde68a;}
  #bookmarkPill.active{background:#b45309;box-shadow:0 0 0 2px #f59e0b;}
  .bm-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:2px 4px;opacity:0.3;transition:opacity 0.15s;flex-shrink:0;line-height:1;}
  .bm-btn:hover,.bm-btn.bm-active{opacity:1;}
  .bm-btn.bm-active{filter:sepia(1) saturate(4) hue-rotate(5deg);}
  .wrong-pill:hover{background:#991b1b;}
  .wrong-pill.empty{opacity:0.35;cursor:default;pointer-events:none;}
  .mode-banner{padding:8px 24px;font-size:0.82rem;font-weight:600;text-align:center;display:none;}
  .mode-banner.wrong{background:#450a0a;color:#fca5a5;border-bottom:1px solid #7f1d1d;display:block;}
  .main{max-width:820px;margin:0 auto;padding:28px 20px;}

  /* BLOCK CARD */
  .block-card{background:#1e293b;border:1px solid #334155;border-radius:16px;margin-bottom:24px;overflow:hidden;}
  .block-card.review-mode{border-color:#7f1d1d;}

  /* BLOCK HEADER */
  .block-hdr{background:#162032;border-bottom:1px solid #334155;padding:18px 24px;}
  .block-hdr-meta{font-size:0.72rem;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
  .block-hdr-type{display:inline-flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .type-badge{display:inline-block;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em;}
  .badge-tf{background:#1d4ed8;color:#bfdbfe;}
  .badge-mc{background:#7c3aed;color:#ddd6fe;}
  .block-hdr-context{font-size:0.9rem;color:#94a3b8;line-height:1.6;}

  /* DATASET TABLE */
  .dataset-wrap{margin-top:12px;overflow-x:auto;}
  .dataset-label{font-size:0.72rem;color:#f59e0b;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .dataset-table{border-collapse:collapse;font-size:0.88rem;min-width:320px;}
  .dataset-table th{background:#1e3a5f;color:#38bdf8;font-weight:700;padding:6px 14px;border:1px solid #334155;text-align:center;}
  .dataset-table td{padding:5px 14px;border:1px solid #334155;text-align:center;color:#e2e8f0;}
  .dataset-table tr:nth-child(even) td{background:#162032;}
  .neg{color:#fca5a5;font-weight:700;}
  .pos{color:#86efac;font-weight:700;}

  /* INDIVIDUAL QUESTIONS IN BLOCK */
  .block-questions{padding:0 24px;}
  .bq{padding:20px 0;border-bottom:1px solid #1e293b44;}
  .bq:last-child{border-bottom:none;padding-bottom:24px;}
  .bq-header{display:flex;gap:10px;align-items:flex-start;margin-bottom:4px;}
  .bq-num{background:#334155;color:#94a3b8;font-size:0.75rem;font-weight:700;padding:2px 8px;border-radius:12px;flex-shrink:0;margin-top:3px;}
  .bq-ctx{font-size:0.8rem;color:#64748b;font-style:italic;margin-bottom:6px;line-height:1.5;}
  .bq-text{font-size:1rem;line-height:1.8;color:#f1f5f9;margin-bottom:12px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .option-btn{background:#0f172a;border:2px solid #334155;border-radius:10px;padding:12px 16px;text-align:left;color:#e2e8f0;font-size:0.92rem;cursor:pointer;transition:all 0.15s;line-height:1.6;}
  .option-btn:hover:not(:disabled){border-color:#38bdf8;background:#1e3a5f;}
  .option-btn:disabled{cursor:default;}
  .option-btn.correct{border-color:#22c55e!important;background:#052e16!important;color:#86efac!important;}
  .option-btn.wrong{border-color:#ef4444!important;background:#2d0505!important;color:#fca5a5!important;}
  .tf-row{display:flex;gap:10px;margin-top:0;}
  .tf-btn{flex:1;padding:15px;border-radius:10px;border:2px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
  .tf-btn:hover:not(:disabled){border-color:#38bdf8;background:#1e3a5f;}
  .tf-btn:disabled{cursor:default;}
  .tf-btn.correct{border-color:#22c55e!important;background:#052e16!important;color:#86efac!important;}
  .tf-btn.wrong{border-color:#ef4444!important;background:#2d0505!important;color:#fca5a5!important;}
  .feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:0.88rem;font-weight:500;display:none;}
  .feedback.correct{background:#052e16;border:1px solid #22c55e;color:#86efac;display:block;}
  .feedback.wrong{background:#2d0505;border:1px solid #ef4444;color:#fca5a5;display:block;}

  /* NAV */
  .nav-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .nav-btn{background:#334155;border:none;color:#e2e8f0;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:0.95rem;font-weight:600;transition:background 0.15s;}
  .nav-btn:hover{background:#475569;}
  .nav-btn.primary{background:#0284c7;}
  .nav-btn.primary:hover{background:#0369a1;}

  /* RESULTS */
  .results{text-align:center;padding:40px 20px;}
  .big-score{font-size:4rem;font-weight:800;color:#38bdf8;margin:20px 0;}
  .results p{color:#94a3b8;margin-bottom:8px;}
  .results-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px;}
  .restart-btn{background:#0284c7;border:none;color:white;padding:14px 28px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;}
  .restart-btn:hover{background:#0369a1;}
  .review-btn{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5;padding:14px 28px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;}
  .review-btn:hover{background:#991b1b;}
  .review-btn:disabled{opacity:0.35;cursor:default;}

  .katex{color:#e2e8f0;font-size:1em;}
  .option-btn.correct .katex,.tf-btn.correct .katex{color:#86efac;}
  .option-btn.wrong .katex,.tf-btn.wrong .katex{color:#fca5a5;}
  @media(max-width:500px){.main{padding:16px 10px;}.block-hdr,.block-questions{padding-left:14px;padding-right:14px;}}
</style>
</head>
<body>
<div class="header">
  <h1 id="titleH1">OMML Quiz</h1>
  <div class="controls">
    <select id="filterSource"><option value="all">Tutti gli esami</option></select>
    <select id="filterType">
      <option value="all">Tutti i tipi</option>
      <option value="truefalse">Vero / Falso</option>
      <option value="multiple">Risposta multipla</option>
    </select>
    <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">Mescola</button>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="score-bar">
  <div class="score-item"><div class="dot" style="background:#22c55e"></div><span id="correctCount">0</span> corrette</div>
  <div class="score-item"><div class="dot" style="background:#ef4444"></div><span id="wrongCount">0</span> errate</div>
  <div class="score-item"><div class="dot" style="background:#94a3b8"></div><span id="skipCount">0</span> rimanenti</div>
  <div class="score-item" style="margin-left:auto;gap:12px">
    <button class="wrong-pill empty" id="bookmarkPill" onclick="toggleBookmarkFilter()">&#128278; Da rivedere: <span id="bookmarkCount">0</span></button>
    <button class="wrong-pill empty" id="wrongPill" onclick="startWrongReview()">&#9733; Ripassa sbagliate: <span id="wrongPillCount">0</span></button>
    <span style="color:#64748b">Blocco <span id="qIndex">-</span> / <span id="qTotal">-</span></span>
  </div>
</div>
<div class="mode-banner" id="modeBanner">Ripasso — stai ripassando le domande sbagliate</div>
<div class="main"><div id="quizArea"></div></div>
<script>
var katexReady=false, pendingTypeset=null;
var GREEK={'α':'\\alpha','β':'\\beta','γ':'\\gamma','δ':'\\delta','ε':'\\varepsilon','ζ':'\\zeta','η':'\\eta','θ':'\\theta','ι':'\\iota','κ':'\\kappa','λ':'\\lambda','μ':'\\mu','ν':'\\nu','ξ':'\\xi','π':'\\pi','ρ':'\\rho','σ':'\\sigma','τ':'\\tau','υ':'\\upsilon','φ':'\\phi','χ':'\\chi','ψ':'\\psi','ω':'\\omega','Γ':'\\Gamma','Δ':'\\Delta','Θ':'\\Theta','Λ':'\\Lambda','Ξ':'\\Xi','Π':'\\Pi','Σ':'\\Sigma','Φ':'\\Phi','Ψ':'\\Psi','Ω':'\\Omega','∑':'\\sum ','∏':'\\prod ','∫':'\\int ','∇':'\\nabla ','≤':'\\leq','≥':'\\geq','≠':'\\neq','∈':'\\in','∉':'\\notin','⊂':'\\subset','⊆':'\\subseteq','∩':'\\cap','∪':'\\cup','∅':'\\emptyset','→':'\\rightarrow','←':'\\leftarrow','↔':'\\leftrightarrow','·':'\\cdot','×':'\\times','÷':'\\div','∀':'\\forall','∃':'\\exists','−':'-'};
function applyGreek(t){var k=Object.keys(GREEK);for(var i=0;i<k.length;i++)t=t.split(k[i]).join(GREEK[k[i]]);return t;}
function mathify(raw){
  var t=applyGreek(raw);t=t.replace(/\\mu([a-zA-Z])/g,'\\mu $1');t=t.replace(/\\nabla([a-zA-Z])/g,'\\nabla $1');
  t=t.replace(/([a-zA-Z])\*\^T/g,'$1^{*T}');
  t=t.replace(/(\\[a-zA-Z]+)\*_/g,'$1^{*}_');t=t.replace(/(\\[a-zA-Z]+)\*(?=[^_]|$)/g,'$1^{*}');
  t=t.replace(/([a-zA-Z])\*_/g,'$1^{*}_');t=t.replace(/([a-zA-Z])\*\b/g,'$1^{*}');
  t=t.replace(/(\^{[^}]+})\^{?\*}?/g,'$1');
  var toks=t.split(' ');
  function isMath(s){if(!s)return false;if(/[\\_{}\^]/.test(s))return true;if(/[a-zA-Z]\*/.test(s)||/\*[a-zA-Z]/.test(s))return true;return false;}
  var mf=toks.map(isMath);
  for(var pass=0;pass<3;pass++){for(var i=0;i<toks.length;i++){if(mf[i])continue;var pM=i>0&&mf[i-1],nM=i<toks.length-1&&mf[i+1];if(pM&&nM){if(/^[=<>+\-*/0-9().!]+$/.test(toks[i])||/^[a-zA-Z]$/.test(toks[i]))mf[i]=true;}}}
  var out=[],buf=[];
  for(var i=0;i<=toks.length;i++){if(i<toks.length&&mf[i]){buf.push(toks[i]);}else{if(buf.length){out.push('\\('+buf.join(' ').trim()+'\\)');buf=[];}if(i<toks.length)out.push(toks[i]);}}
  return out.join(' ');
}
function toHTML(raw){
  if(!raw)return '';
  var m=mathify(raw);
  var parts=m.split(/(\\\([\s\S]*?\\\))/);
  return parts.map(function(p){if(p.indexOf('\\(')===0)return p;return p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}).join('');
}
function typesetArea(){
  var area=document.getElementById('quizArea');if(!area)return;
  if(katexReady&&typeof renderMathInElement!=='undefined'){
    renderMathInElement(area,{delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false,errorColor:'#94a3b8'});
  }else{pendingTypeset=function(){typesetArea();};}
}

// ── EXERCISE KEY: groups consecutive MC questions into blocks ─────────────
function exKey(q){
  var t=q.question, s=q.source;
  if(/y=\(-1,-1,-1,-1,1,1,1\)/.test(t)||/x1=\(2,3\.5,5,3,4,1,2\)/.test(t)) return s+'|7pts';
  var cm=t.match(/SOFT SVM dual C=([\d.]+)/);if(cm)return s+'|svm_c_'+cm[1];
  var am=t.match(/alpha\*\s*=\s*\(([^)]+)\)/);if(am)return s+'|alpha_'+am[1].replace(/[\s,.]/g,'');
  if(/\bQP\b.*min|min.*Q.*x.*s\.t\./.test(t))return s+'|qp';
  if(/RBF network/.test(t))return s+'|rbf';
  if(/MLP network/.test(t))return s+'|mlp';
  if(/multilayer network/.test(t))return s+'|multilayer';
  if(/[Oo]nline gradient|cyclic order/.test(t))return s+'|grad';
  if(/[Pp]erceptron/.test(t))return s+'|perceptron';
  if(/CART|decision tree|Gini|entropy|pruning/.test(t))return s+'|cart';
  if(/multiclass|OAA|OAO|one-against/.test(t))return s+'|multiclass';
  var m2=t.match(/^\[([^\]|]{0,60})/);return s+'|'+(m2?m2[1]:t.substring(0,50));
}

function buildBlocks(pool){
  var res=[],i=0;
  while(i<pool.length){
    var q=pool[i];
    if(q.type==='truefalse'){res.push([q]);i++;continue;}
    var key=exKey(q),block=[q],j=i+1;
    while(j<pool.length&&pool[j].type==='multiple'&&exKey(pool[j])===key){block.push(pool[j]);j++;}
    res.push(block);i=j;
  }
  return res;
}

// ── DATASET TABLE ─────────────────────────────────────────────────────────
var DS7 = {x1:[2,3.5,5,3,4,1,2], x2:[4,3.5,2.5,3,1,2,1], y:[-1,-1,-1,-1,1,1,1]};

function datasetTableHTML(data){
  var rows='';
  for(var i=0;i<data.x1.length;i++){
    var ycls=data.y[i]<0?'neg':'pos', yval=data.y[i]<0?'-1':'+1';
    rows+='<tr><td>'+(i+1)+'</td><td>'+data.x1[i]+'</td><td>'+data.x2[i]+'</td><td class="'+ycls+'">'+yval+'</td></tr>';
  }
  return '<div class="dataset-wrap"><div class="dataset-label">Dataset</div><table class="dataset-table"><tr><th>i</th><th>x&#8321;</th><th>x&#8322;</th><th>y</th></tr>'+rows+'</table></div>';
}

function blockHeaderHTML(block, meta, isReview){
  var q0=block[0];
  var src=q0.source.replace('.pdf','');
  var isTF=q0.type==='truefalse';
  var badge=isTF?'<span class="type-badge badge-tf">Vero / Falso</span>':'<span class="type-badge badge-mc">Risposta Multipla &nbsp;&middot;&nbsp; '+block.length+' domande</span>';

  // Detect 7-point dataset
  var has7pts=block.some(function(q){return /y=\(-1,-1,-1,-1,1,1,1\)|x1=\(2,3\.5,5,3,4,1,2\)/.test(q.question);});
  var has6pts=block.some(function(q){return /x1=\(0\.5,2,2,3,3,2\.5\)/.test(q.question);});

  // Extract clean context (non-dataset bracket content)
  var ctxText='';
  var m=q0.question.match(/\|\s*([^\]]+)\]/);  // after " | " inside bracket
  if(m){ctxText=m[1].trim();}
  else{var m2=q0.question.match(/^\[([^\]]+)\]/);if(m2&&!m2[1].match(/^Dataset:/))ctxText=m2[1].trim();}

  var extraCtx = ctxText ? '<div class="block-hdr-context">'+toHTML(ctxText)+'</div>' : '';
  var DS6={x1:[0.5,2,2,3,3,2.5],x2:[2,3.5,0,1,2.5,-0.5],y:[1,1,-1,-1,1,-1]};
  var tableHTML = has7pts ? datasetTableHTML(DS7) : (has6pts ? datasetTableHTML(DS6) : '');

  return '<div class="block-hdr">'+
    '<div class="block-hdr-meta">'+src+(isReview?' &nbsp;&#9733; RIPASSO':'')+'</div>'+
    '<div class="block-hdr-type">'+badge+'</div>'+
    extraCtx+tableHTML+
  '</div>';
}

// Strip injected dataset prefix + bracket from display text
function displayText(q, inBlock){
  var t=q.question;
  if(inBlock){
    // Remove leading [Dataset:...|...] or [Dataset:...] bracket entirely
    t=t.replace(/^\[Dataset:[^\]]+\]\s*/,'');
    // Remove remaining leading [SomeBracket] if block header already shows it
    // (keep it for single-question blocks)
    if(t.match(/^\[[^\]]+\]\s+\S/)){
      var stripped=t.replace(/^\[[^\]]+\]\s*/,'');
      if(stripped.length>10)t=stripped;
    }
  }
  return t;
}

// ── QUIZ STATE ─────────────────────────────────────────────────────────────
var ALL_QUESTIONS=QUESTIONS.slice();

var blocks=[],curBlock=0,blockAnswers=[];
var correct=0,wrong=0,wrongSet=[],isReview=false;
var shuffle=false,filterSource='all',filterType='all';
var bookmarks=new Set(),filterBookmarks=false;

// total individual questions answered
function totalAnswered(){return blockAnswers.reduce(function(s,ba){return s+ba.filter(function(a){return a!==null;}).length;},0);}
function totalQuestions(){return blocks.reduce(function(s,b){return s+b.length;},0);}

document.getElementById('titleH1').textContent='OMML Quiz — '+ALL_QUESTIONS.length+' domande';
var sources=[...new Set(ALL_QUESTIONS.map(function(q){return q.source;}))].sort();
var sel=document.getElementById('filterSource');
sources.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s.replace('.pdf','');sel.appendChild(o);});
sel.onchange=function(){filterSource=sel.value;endReview();resetQuiz();};
document.getElementById('filterType').onchange=function(e){filterType=e.target.value;endReview();resetQuiz();};
function toggleShuffle(){shuffle=!shuffle;document.getElementById('shuffleBtn').classList.toggle('active',shuffle);if(!isReview)resetQuiz();}
function endReview(){isReview=false;document.getElementById('modeBanner').className='mode-banner';}

function resetQuiz(){
  endReview();
  var pool=ALL_QUESTIONS.filter(function(q,i){
    if(filterBookmarks&&!bookmarks.has(i))return false;
    if(filterSource!=='all'&&q.source!==filterSource)return false;
    if(filterType!=='all'&&q.type!==filterType)return false;
    return true;
  });
  if(shuffle)blocks=buildBlocks(pool).sort(function(){return Math.random()-0.5;});
  else blocks=buildBlocks(pool);
  curBlock=0;correct=0;wrong=0;
  blockAnswers=blocks.map(function(b){return new Array(b.length).fill(null);});
  updateBar();renderBlock();
}

function startWrongReview(){
  if(!wrongSet.length)return;
  isReview=true;document.getElementById('modeBanner').className='mode-banner wrong';
  blocks=wrongSet.map(function(q){return [q];});
  if(shuffle)blocks=blocks.sort(function(){return Math.random()-0.5;});
  curBlock=0;correct=0;wrong=0;
  blockAnswers=blocks.map(function(){return [null];});
  updateBar();renderBlock();
}

function updateWrongPill(){
  document.getElementById('wrongPillCount').textContent=wrongSet.length;
  var p=document.getElementById('wrongPill');
  if(wrongSet.length>0)p.classList.remove('empty');else p.classList.add('empty');
}
function updateBar(){
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=wrong;
  var tot=totalQuestions(), ans=totalAnswered();
  document.getElementById('skipCount').textContent=tot-ans;
  document.getElementById('qIndex').textContent=Math.min(curBlock+1,blocks.length||1);
  document.getElementById('qTotal').textContent=blocks.length;
  document.getElementById('progressBar').style.width=(blocks.length?curBlock/blocks.length*100:0)+'%';
}

function renderBlock(){
  var area=document.getElementById('quizArea');
  if(!blocks.length){area.innerHTML='<div class="block-card"><div class="block-hdr"><p style="color:#94a3b8">Nessuna domanda.</p></div></div>';return;}
  if(curBlock>=blocks.length){showResults();return;}

  var block=blocks[curBlock], answers=blockAnswers[curBlock];
  var inBlock=block.length>1;

  var cardCls='block-card'+(isReview?' review-mode':'');
  var hdr=blockHeaderHTML(block, curBlock, isReview);

  var qsHTML='';
  for(var qi=0;qi<block.length;qi++){
    var q=block[qi], ans=answers[qi], done=ans!==null;
    var txt=displayText(q,inBlock);
    var numLabel=inBlock?'<span class="bq-num">Q'+(qi+1)+'</span>':'';
    var optHTML='';
    if(q.type==='truefalse'){
      var vals=['True','False'];
      for(var vi=0;vi<2;vi++){
        var v=vals[vi],cls='tf-btn';
        if(done){if(v===q.correct)cls+=' correct';else if(v===ans)cls+=' wrong';}
        optHTML+='<button class="'+cls+'" onclick="answerQ('+curBlock+','+qi+',\''+v+'\')" '+(done?'disabled':'')+'>'+(v==='True'?'&#10003; Vero':'&#10007; Falso')+'</button>';
      }
      optHTML='<div class="tf-row">'+optHTML+'</div>';
    } else {
      var ca=Array.isArray(q.correct)?q.correct:[q.correct];
      for(var oi=0;oi<q.options.length;oi++){
        var opt=q.options[oi],m2=opt.match(/^([A-E])[).\s]/),letter=m2?m2[1]:String.fromCharCode(65+oi);
        var cls2='option-btn';
        if(done){if(ca.indexOf(letter)>=0)cls2+=' correct';else if((Array.isArray(ans)?ans.indexOf(letter)>=0:ans===letter)&&ca.indexOf(letter)<0)cls2+=' wrong';}
        optHTML+='<button class="'+cls2+'" onclick="answerQ('+curBlock+','+qi+',\''+letter+'\')" '+(done?'disabled':'')+'>'+toHTML(opt)+'</button>';
      }
      optHTML='<div class="options">'+optHTML+'</div>';
    }
    var fbHTML='';
    if(done){
      var ca2=Array.isArray(q.correct)?q.correct:[q.correct];
      var aa=Array.isArray(ans)?ans:[ans];
      var ok=ca2.some(function(c){return aa.indexOf(c)>=0;});
      fbHTML=ok?'<div class="feedback correct">&#10003; Corretto!</div>':'<div class="feedback wrong">&#10007; Errato &mdash; Risposta: <strong>'+(Array.isArray(q.correct)?q.correct.join(', '):q.correct)+'</strong></div>';
    }
    var qIdx=ALL_QUESTIONS.indexOf(q);
    var bm=bookmarks.has(qIdx);
    var bmBtn='<button class="bm-btn'+(bm?' bm-active':'')+'\" onclick=\"toggleBookmark('+qIdx+')\" title="'+(bm?'Rimuovi da Da rivedere':'Aggiungi a Da rivedere')+'">&#128278;</button>';
    qsHTML+='<div class="bq"><div class="bq-header">'+numLabel+'<div class="bq-text">'+toHTML(txt)+'</div>'+bmBtn+'</div>'+optHTML+fbHTML+'</div>';
  }

  var prevBtn=curBlock>0?'<button class="nav-btn" onclick="goBlock('+(curBlock-1)+')">&#8592; Precedente</button>':'<button class="nav-btn" disabled style="opacity:0.3">&#8592;</button>';
  var nextBtn=curBlock<blocks.length-1?'<button class="nav-btn primary" onclick="goBlock('+(curBlock+1)+')">Prossima &#8594;</button>':'<button class="nav-btn primary" onclick="showResults()">Risultati &#127937;</button>';

  area.innerHTML='<div style="font-size:0.85rem;color:#94a3b8;margin-bottom:12px">Blocco '+(curBlock+1)+' di '+blocks.length+' &nbsp;&middot;&nbsp; '+totalAnswered()+' / '+totalQuestions()+' domande risposte'+(isReview?' &nbsp;<span style="color:#fca5a5;font-weight:600">[RIPASSO]</span>':'')+'</div>'+
    '<div class="'+cardCls+'">'+hdr+'<div class="block-questions">'+qsHTML+'</div></div>'+
    '<div class="nav-row">'+prevBtn+nextBtn+'</div>';
  typesetArea();
}

function answerQ(bi, qi, val){
  if(blockAnswers[bi][qi]!==null)return;
  blockAnswers[bi][qi]=val;
  var q=blocks[bi][qi];
  var ca=Array.isArray(q.correct)?q.correct:[q.correct];
  var ok=ca.indexOf(val)>=0;
  if(ok){correct++;if(isReview){wrongSet=wrongSet.filter(function(x){return x!==q;});updateWrongPill();}}
  else{wrong++;if(wrongSet.indexOf(q)<0){wrongSet.push(q);updateWrongPill();}}
  updateBar();renderBlock();saveState();
}

function goBlock(idx){curBlock=idx;updateBar();renderBlock();saveState();}

function updateBookmarkPill(){
  var c=document.getElementById('bookmarkCount'),p=document.getElementById('bookmarkPill');
  if(!c||!p)return;
  c.textContent=bookmarks.size;
  if(bookmarks.size>0)p.classList.remove('empty');else p.classList.add('empty');
}
function toggleBookmark(qIdx){
  if(bookmarks.has(qIdx))bookmarks.delete(qIdx);else bookmarks.add(qIdx);
  updateBookmarkPill();saveState();renderBlock();
}
function toggleBookmarkFilter(){
  filterBookmarks=!filterBookmarks;
  var p=document.getElementById('bookmarkPill');
  if(p)p.classList.toggle('active',filterBookmarks);
  resetQuiz();
}
function saveState(){
  var ansMap={};
  blocks.forEach(function(block,bi){block.forEach(function(q,qi){var ans=blockAnswers[bi][qi];if(ans!==null){var idx=ALL_QUESTIONS.indexOf(q);if(idx>=0)ansMap[idx]=ans;}});});
  try{localStorage.setItem('omml_state',JSON.stringify({filterSource:filterSource,filterType:filterType,shuffle:shuffle,curBlock:curBlock,answers:ansMap,bookmarks:Array.from(bookmarks),correct:correct,wrong:wrong,wrongSet:wrongSet.map(function(q){return ALL_QUESTIONS.indexOf(q);}),'v':2}));}catch(e){}
}
function loadState(){
  try{
    var s=JSON.parse(localStorage.getItem('omml_state'));
    if(!s||s.v!==2)return false;
    filterSource=s.filterSource||'all';filterType=s.filterType||'all';shuffle=!!s.shuffle;
    bookmarks=new Set(s.bookmarks||[]);
    document.getElementById('filterSource').value=filterSource;
    document.getElementById('filterType').value=filterType;
    document.getElementById('shuffleBtn').classList.toggle('active',shuffle);
    updateBookmarkPill();updateWrongPill();
    var pool=ALL_QUESTIONS.filter(function(q,i){if(filterSource!=='all'&&q.source!==filterSource)return false;if(filterType!=='all'&&q.type!==filterType)return false;return true;});
    if(shuffle)blocks=buildBlocks(pool).sort(function(){return Math.random()-0.5;});else blocks=buildBlocks(pool);
    blockAnswers=blocks.map(function(b){return new Array(b.length).fill(null);});
    correct=s.correct||0;wrong=s.wrong||0;
    wrongSet=(s.wrongSet||[]).map(function(i){return ALL_QUESTIONS[i];}).filter(Boolean);
    if(s.answers){blocks.forEach(function(block,bi){block.forEach(function(q,qi){var idx=ALL_QUESTIONS.indexOf(q);if(idx>=0&&s.answers[idx]!==undefined)blockAnswers[bi][qi]=s.answers[idx];});});}
    curBlock=Math.min(s.curBlock||0,Math.max(0,blocks.length-1));
    updateBar();updateWrongPill();renderBlock();
    return true;
  }catch(e){return false;}
}
function clearProgress(){
  if(confirm('Cancellare tutti i progressi salvati?')){
    localStorage.removeItem('omml_state');
    bookmarks=new Set();updateBookmarkPill();
    endReview();resetQuiz();
  }
}function showResults(){
  var tot=totalQuestions(), ac=totalAnswered();
  var pct=ac?Math.round(correct/ac*100):0;
  var msg=pct>=80?'Ottimo! &#127881;':pct>=60?'Bene! &#128077;':'Dai, studia ancora! &#128218;';
  document.getElementById('quizArea').innerHTML='<div class="results"><h2>'+msg+'</h2><div class="big-score">'+pct+'%</div><p><strong>'+correct+'</strong> corrette su <strong>'+ac+'</strong> ('+tot+' totali)</p><p>'+wrong+' errate &nbsp;&middot;&nbsp; '+(tot-ac)+' saltate</p><div class="results-btns"><button class="restart-btn" onclick="endReview();resetQuiz()">&#128260; Ricomincia</button><button class="restart-btn" style="background:#1e293b;border:1px solid #475569;font-size:0.8rem" onclick="clearProgress()">&#128465; Cancella progressi</button><button class="review-btn" '+(wrongSet.length?'':'disabled')+' onclick="startWrongReview()">&#9733; Ripassa sbagliate ('+wrongSet.length+')</button></div></div>';
  document.getElementById('progressBar').style.width='100%';
}

var _katexPoll=setInterval(function(){
  if(typeof renderMathInElement!=="undefined"){
    clearInterval(_katexPoll);
    katexReady=true;
    if(pendingTypeset){pendingTypeset();pendingTypeset=null;}
  }
},100);
if(!loadState())resetQuiz();
</script>
</body>
</html>
